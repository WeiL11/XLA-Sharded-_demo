name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["master", "main"]

jobs:
  test:
    name: pytest (CPU, Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install CPU-only JAX first so we don't pull in CUDA wheels.
          pip install "jax[cpu]>=0.4.35" "jaxlib>=0.4.35"
          pip install -e ".[dev]"

      - name: Run tests
        env:
          # Simulate 2 XLA devices on CPU so sharding tests are exercised.
          XLA_FLAGS: "--xla_force_host_platform_device_count=2"
        run: pytest -q --tb=short tests/

  lint:
    name: Ruff lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check --select E,W,F --ignore E501 .
